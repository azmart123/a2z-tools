<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiText Pro | Intelligent OCR</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tesseract.js -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6', // Teal
                            600: '#0d9488',
                            700: '#0f766e',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Modern Scrollbar */
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent; 
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }

        /* Glassmorphism utilities */
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Animations */
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.2); opacity: 0; }
        }
        .animate-ring {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden selection:bg-brand-500 selection:text-white">

    <!-- Navbar -->
    <nav class="glass fixed w-full z-50 h-16 flex items-center justify-between px-6 transition-all duration-300">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-gradient-to-br from-brand-500 to-brand-700 rounded-lg flex items-center justify-center text-white shadow-lg shadow-brand-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                </svg>
            </div>
            <span class="font-bold text-lg tracking-tight text-slate-900">OptiText<span class="text-brand-600">Pro</span></span>
        </div>
        <div class="flex items-center gap-4">
            <div class="hidden md:flex items-center gap-2 text-xs font-medium text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full border border-slate-200">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                Engine Ready
            </div>
        </div>
    </nav>

    <!-- Main Workspace -->
    <main class="flex-1 flex flex-col lg:flex-row mt-16 h-[calc(100vh-4rem)]">
        
        <!-- Left Panel: Input -->
        <section class="w-full lg:w-5/12 p-6 flex flex-col gap-6 border-b lg:border-b-0 lg:border-r border-slate-200 bg-white/50 overflow-y-auto custom-scroll relative">
            
            <div class="flex items-center justify-between">
                <div>
                    <h2 class="text-xl font-bold text-slate-900">Input Image</h2>
                    <p class="text-sm text-slate-500 mt-1">Upload documents, screenshots, or receipts.</p>
                </div>
            </div>

            <!-- Drop Zone -->
            <div id="drop-zone" class="group relative flex-1 min-h-[350px] border-2 border-dashed border-slate-300 rounded-2xl bg-slate-50/50 hover:bg-brand-50 hover:border-brand-400 transition-all duration-300 flex flex-col items-center justify-center cursor-pointer overflow-hidden">
                <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" accept="image/png, image/jpeg, image/webp">
                
                <!-- Placeholder State -->
                <div id="placeholder-content" class="text-center p-8 transition-transform duration-300 group-hover:scale-105">
                    <div class="w-16 h-16 bg-white rounded-2xl shadow-sm border border-slate-100 flex items-center justify-center mx-auto mb-4 group-hover:shadow-md group-hover:shadow-brand-500/10 transition-shadow">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-400 group-hover:text-brand-500 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                        </svg>
                    </div>
                    <h3 class="text-base font-semibold text-slate-700">Drag & Drop or Click</h3>
                    <p class="text-xs text-slate-400 mt-2">Supports JPG, PNG, WEBP</p>
                </div>

                <!-- Preview State -->
                <div id="preview-wrapper" class="hidden absolute inset-0 w-full h-full bg-slate-100 flex items-center justify-center p-4">
                    <img id="image-preview" class="max-w-full max-h-full rounded-lg shadow-xl object-contain" src="" alt="Preview">
                    <button id="clear-btn" class="absolute top-4 right-4 p-2 bg-white/90 backdrop-blur text-red-500 rounded-full shadow-lg hover:bg-red-50 transition-all z-20" title="Remove Image">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex flex-col gap-3">
                <!-- Progress Bar -->
                <div id="progress-area" class="h-10 opacity-0 transition-opacity duration-300 flex items-center gap-3 bg-white border border-slate-100 rounded-lg px-4 shadow-sm">
                    <div class="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-brand-500 rounded-full w-0 transition-all duration-300"></div>
                    </div>
                    <span id="progress-text" class="text-xs font-mono text-slate-500 w-12 text-right">0%</span>
                </div>

                <button id="convert-btn" class="w-full py-3.5 px-6 bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-semibold rounded-xl shadow-lg shadow-brand-500/25 transition-all disabled:opacity-50 disabled:cursor-not-allowed disabled:shadow-none flex items-center justify-center gap-2 group" disabled>
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white hidden" id="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    <span id="btn-text">Extract Text</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 group-hover:translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                    </svg>
                </button>
            </div>
        </section>

        <!-- Right Panel: Output -->
        <section class="flex-1 bg-slate-100/50 p-6 flex flex-col h-full relative">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold text-slate-900">Result</h2>
                <div class="flex gap-2">
                    <button id="copy-btn" class="flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:text-brand-600 hover:border-brand-200 transition-all disabled:opacity-50" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                        </svg>
                        Copy
                    </button>
                    <button id="download-btn" class="flex items-center gap-2 px-3 py-1.5 text-sm font-medium text-slate-600 bg-white border border-slate-200 rounded-lg hover:bg-slate-50 hover:text-brand-600 hover:border-brand-200 transition-all disabled:opacity-50" disabled>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        Save
                    </button>
                </div>
            </div>

            <!-- Editor Wrapper -->
            <div class="relative flex-1 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col group focus-within:ring-2 focus-within:ring-brand-500/20 focus-within:border-brand-500 transition-all">
                <textarea id="output-text" class="flex-1 w-full p-6 font-mono text-sm leading-relaxed text-slate-700 resize-none focus:outline-none custom-scroll bg-transparent" placeholder="Extracted text will appear here..."></textarea>
                
                <!-- Floating Stats -->
                <div class="absolute bottom-4 right-6 pointer-events-none">
                    <div class="bg-slate-900/5 backdrop-blur-sm px-3 py-1 rounded-full text-xs font-mono text-slate-500 border border-slate-200/50">
                        <span id="char-count">0</span> chars • <span id="word-count">0</span> words
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-20 right-6 translate-x-full opacity-0 transition-all duration-500 z-50">
        <div class="bg-slate-800 text-white px-4 py-3 rounded-lg shadow-xl shadow-slate-500/20 flex items-center gap-3">
            <div class="bg-green-500/20 p-1 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-green-400" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" />
                </svg>
            </div>
            <span id="toast-msg" class="text-sm font-medium">Text copied to clipboard</span>
        </div>
    </div>

    <script>
        // DOM Elements
        const els = {
            dropZone: document.getElementById('drop-zone'),
            fileInput: document.getElementById('file-input'),
            placeholder: document.getElementById('placeholder-content'),
            previewWrapper: document.getElementById('preview-wrapper'),
            preview: document.getElementById('image-preview'),
            clearBtn: document.getElementById('clear-btn'),
            convertBtn: document.getElementById('convert-btn'),
            btnText: document.getElementById('btn-text'),
            spinner: document.getElementById('spinner'),
            progressArea: document.getElementById('progress-area'),
            progressBar: document.getElementById('progress-bar'),
            progressText: document.getElementById('progress-text'),
            output: document.getElementById('output-text'),
            copyBtn: document.getElementById('copy-btn'),
            downloadBtn: document.getElementById('download-btn'),
            charCount: document.getElementById('char-count'),
            wordCount: document.getElementById('word-count'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toast-msg')
        };

        let currentFile = null;

        // --- Drag & Drop Interaction ---
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            els.dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                e.stopPropagation();
            });
        });

        ['dragenter', 'dragover'].forEach(eventName => {
            els.dropZone.addEventListener(eventName, () => {
                els.dropZone.classList.add('border-brand-500', 'bg-brand-50');
                els.dropZone.classList.remove('border-slate-300');
            });
        });

        ['dragleave', 'drop'].forEach(eventName => {
            els.dropZone.addEventListener(eventName, () => {
                els.dropZone.classList.remove('border-brand-500', 'bg-brand-50');
                els.dropZone.classList.add('border-slate-300');
            });
        });

        els.dropZone.addEventListener('drop', (e) => handleFile(e.dataTransfer.files[0]));
        els.fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));

        function handleFile(file) {
            if (!file || !file.type.match('image.*')) {
                showToast('Please upload a valid image file', 'error');
                return;
            }

            currentFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                els.preview.src = e.target.result;
                els.placeholder.classList.add('hidden');
                els.previewWrapper.classList.remove('hidden');
                els.convertBtn.disabled = false;
                els.convertBtn.classList.add('ring-2', 'ring-offset-2', 'ring-brand-500'); // Focus hint
                setTimeout(() => els.convertBtn.classList.remove('ring-2', 'ring-offset-2', 'ring-brand-500'), 1000);
            };
            reader.readAsDataURL(file);
        }

        els.clearBtn.addEventListener('click', (e) => {
            e.preventDefault(); // Stop label click
            e.stopPropagation();
            resetUI();
        });

        function resetUI() {
            currentFile = null;
            els.fileInput.value = '';
            els.preview.src = '';
            els.placeholder.classList.remove('hidden');
            els.previewWrapper.classList.add('hidden');
            els.convertBtn.disabled = true;
            els.progressArea.classList.add('opacity-0');
            els.output.value = '';
            updateStats();
            toggleActionButtons(false);
        }

        // --- OCR Processing ---
        els.convertBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            // Loading State
            els.convertBtn.disabled = true;
            els.spinner.classList.remove('hidden');
            els.btnText.textContent = 'Processing...';
            els.progressArea.classList.remove('opacity-0');
            els.output.value = '';
            toggleActionButtons(false);

            try {
                // Tesseract v5 Syntax (Fixed)
                const worker = await Tesseract.createWorker('eng', 1, {
                    logger: m => {
                        if (m.status === 'recognizing text') {
                            const pct = Math.round(m.progress * 100);
                            els.progressBar.style.width = `${pct}%`;
                            els.progressText.innerText = `${pct}%`;
                        }
                    }
                });

                const { data: { text } } = await worker.recognize(currentFile);
                await worker.terminate();

                // Success State
                els.output.value = text.trim();
                updateStats();
                toggleActionButtons(true);
                showToast('Text extracted successfully!');

            } catch (err) {
                console.error(err);
                showToast('Failed to process image', 'error');
            } finally {
                // Reset Button
                els.convertBtn.disabled = false;
                els.spinner.classList.add('hidden');
                els.btnText.textContent = 'Extract Text';
                
                // Hide progress bar slowly
                setTimeout(() => {
                    els.progressArea.classList.add('opacity-0');
                    setTimeout(() => {
                        els.progressBar.style.width = '0%';
                        els.progressText.innerText = '0%';
                    }, 300);
                }, 2000);
            }
        });

        // --- Utilities & Listeners ---

        els.output.addEventListener('input', updateStats);

        function updateStats() {
            const text = els.output.value;
            els.charCount.textContent = text.length;
            els.wordCount.textContent = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        }

        function toggleActionButtons(enabled) {
            els.copyBtn.disabled = !enabled;
            els.downloadBtn.disabled = !enabled;
        }

        els.copyBtn.addEventListener('click', () => {
            els.output.select();
            document.execCommand('copy');
            showToast('Copied to clipboard');
        });

        els.downloadBtn.addEventListener('click', () => {
            const blob = new Blob([els.output.value], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'optitext-result.txt';
            a.click();
            URL.revokeObjectURL(url);
            showToast('Download started');
        });

        function showToast(msg, type = 'success') {
            els.toastMsg.textContent = msg;
            // Reset transforms
            els.toast.classList.remove('translate-x-full', 'opacity-0');
            
            // Auto hide
            setTimeout(() => {
                els.toast.classList.add('translate-x-full', 'opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
