<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor - Tools Wonder</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-blue: #007bff;
            --primary-blue-dark: #0056b3;
            --light-blue-bg: #e7f3ff;
            --text-dark: #212529;
            --text-light: #6c757d;
            --bg-white: #ffffff;
            --border-color: #dee2e6;
            --border-radius: 8px;
            --font-primary: 'Roboto', sans-serif;
            --font-headings: 'Montserrat', sans-serif;
        }

        body {
            font-family: var(--font-primary);
            color: var(--text-dark);
            margin: 0;
            background-color: #f8f9fa;
        }

        .site-header { background-color: var(--bg-white); padding: 15px 0; border-bottom: 1px solid var(--border-color); text-align: center; }
        .site-header a { text-decoration: none; font-family: var(--font-headings); font-size: 1.9rem; font-weight: 700; color: var(--text-dark); }

        .container { max-width: 800px; margin: 40px auto; padding: 20px; background: var(--bg-white); border-radius: var(--border-radius); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        h2 { font-family: var(--font-headings); text-align: center; color: var(--text-dark); margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        h2 i { color: var(--primary-blue); }
        .desc { text-align: center; color: var(--text-light); margin-bottom: 30px; }

        /* Modern Drag & Drop Zone */
        .upload-zone {
            border: 2px dashed var(--primary-blue);
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            background-color: var(--light-blue-bg);
            cursor: pointer;
            transition: 0.3s ease;
            position: relative;
        }
        .upload-zone:hover { background-color: #d1e7ff; }
        .upload-zone i { font-size: 3rem; color: var(--primary-blue); margin-bottom: 15px; }
        .upload-zone p { font-size: 1.1rem; font-weight: 500; margin: 0; }
        .upload-zone input[type="file"] {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer;
        }

        /* Preview Area */
        .preview-area { display: none; text-align: center; margin-top: 30px; }
        .preview-area img { max-width: 100%; max-height: 300px; border-radius: var(--border-radius); border: 1px solid var(--border-color); margin-bottom: 20px; }

        /* Stats & Controls */
        .stats-container { display: flex; justify-content: space-around; background: var(--light-blue-bg); padding: 15px; border-radius: var(--border-radius); margin-bottom: 20px; }
        .stat-box { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.85rem; color: var(--text-light); text-transform: uppercase; font-weight: 700; }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: var(--primary-blue); }

        .controls { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .control-group { display: flex; flex-direction: column; text-align: left; }
        .control-group label { font-weight: 500; margin-bottom: 5px; display: flex; justify-content: space-between; }
        input[type="range"] { padding: 10px 0; cursor: pointer; }
        
        .tool-button {
            background-color: var(--primary-blue); color: var(--bg-white); border: none;
            padding: 12px 24px; border-radius: var(--border-radius); font-weight: 500;
            cursor: pointer; font-size: 1rem; transition: 0.3s; margin-top: 10px; text-transform: uppercase;
        }
        .tool-button:hover { background-color: var(--primary-blue-dark); transform: translateY(-2px); }

        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--primary-blue); text-decoration: none; }
        .back-link:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <header class="site-header">
        <a href="index.html">Tools Wonder</a>
    </header>

    <div class="container">
        <h2><i class="fas fa-compress-arrows-alt"></i> Image Compressor</h2>
        <p class="desc">Reduce image file size significantly without losing quality. 100% secure client-side processing.</p>

        <div class="upload-zone" id="dropZone">
            <i class="fas fa-file-upload"></i>
            <p>Drag & Drop your image here</p>
            <span style="color: var(--text-light); font-size: 0.9rem;">Supports JPG, PNG, WEBP</span>
            <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp">
        </div>

        <div class="preview-area" id="previewArea">
            
            <div class="stats-container">
                <div class="stat-box">
                    <span class="stat-label">Original Size</span>
                    <span class="stat-value" id="originalSize">0 KB</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Compressed Size</span>
                    <span class="stat-value" id="compressedSize">0 KB</span>
                </div>
            </div>

            <img id="imagePreview" src="" alt="Preview">
            
            <div class="controls">
                <div class="control-group">
                    <label>Compression Level: <span id="qualityValue">80% Quality</span></label>
                    <input type="range" id="qualityInput" min="0.1" max="1" step="0.05" value="0.8">
                </div>

                <button class="tool-button" id="downloadBtn"><i class="fas fa-download"></i> Download Compressed</button>
            </div>
        </div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Tools</a>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const previewArea = document.getElementById('previewArea');
        const imagePreview = document.getElementById('imagePreview');
        const qualityInput = document.getElementById('qualityInput');
        const qualityValue = document.getElementById('qualityValue');
        const originalSizeText = document.getElementById('originalSize');
        const compressedSizeText = document.getElementById('compressedSize');
        const downloadBtn = document.getElementById('downloadBtn');
        const dropZone = document.getElementById('dropZone');

        let currentImage = null;
        let originalFileName = "";
        let originalFileType = "";
        let finalCompressedUrl = "";

        // Format bytes to KB/MB
        function formatBytes(bytes, decimals = 2) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
        }

        // Handle file selection
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                originalFileName = file.name.split('.')[0];
                originalFileType = file.type === 'image/png' ? 'image/jpeg' : file.type; // Force PNG to JPEG for compression
                originalSizeText.innerText = formatBytes(file.size);

                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImage = new Image();
                    currentImage.onload = function() {
                        imagePreview.src = currentImage.src;
                        dropZone.style.display = 'none';
                        previewArea.style.display = 'block';
                        compressImage(); // Initial compression
                    }
                    currentImage.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // Update compression dynamically
        qualityInput.addEventListener('input', function() {
            qualityValue.innerText = Math.round(this.value * 100) + '% Quality';
            compressImage();
        });

        // Compression Logic
        function compressImage() {
            if (!currentImage) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = currentImage.width;
            canvas.height = currentImage.height;

            // White background for PNG to JPEG conversion transparency issues
            ctx.fillStyle = "#FFFFFF";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentImage, 0, 0);

            const quality = parseFloat(qualityInput.value);
            finalCompressedUrl = canvas.toDataURL('image/jpeg', quality);

            // Estimate new file size (Base64 length calculation)
            const base64Length = finalCompressedUrl.length - 'data:image/jpeg;base64,'.length;
            const sizeInBytes = Math.round(base64Length * 3 / 4);
            compressedSizeText.innerText = formatBytes(sizeInBytes);
        }

        // Download Logic
        downloadBtn.addEventListener('click', function() {
            if (!finalCompressedUrl) return;
            const link = document.createElement('a');
            link.download = `${originalFileName}_compressed.jpg`;
            link.href = finalCompressedUrl;
            link.click();
        });
    </script>
</body>
</html>
