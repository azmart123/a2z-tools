<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI Auto Background Remover</title>
<!-- Load the AI Library -->
<script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.3.0/dist/imgly-background-removal.min.js"></script>
<style>
    :root {
        --bg: #0f172a;
        --primary: #6366f1;
        --surface: #1e293b;
        --text: #f8fafc;
    }

    body {
        margin: 0; padding: 0;
        font-family: 'Inter', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }

    .container {
        text-align: center;
        width: 100%;
        max-width: 500px;
        padding: 20px;
    }

    /* Upload Box */
    .upload-box {
        border: 2px dashed #475569;
        background: var(--surface);
        padding: 40px;
        border-radius: 20px;
        cursor: pointer;
        transition: 0.3s;
        position: relative;
    }
    .upload-box:hover { border-color: var(--primary); background: #1e293b; }
    
    .preview-area {
        margin-top: 20px;
        position: relative;
        min-height: 300px;
        display: none;
        justify-content: center;
        align-items: center;
        background-image: 
            linear-gradient(45deg, #1f2937 25%, transparent 25%), 
            linear-gradient(-45deg, #1f2937 25%, transparent 25%), 
            linear-gradient(45deg, transparent 75%, #1f2937 75%), 
            linear-gradient(-45deg, transparent 75%, #1f2937 75%);
        background-size: 20px 20px;
        border-radius: 16px;
        overflow: hidden;
    }

    img { max-width: 100%; max-height: 400px; border-radius: 10px; object-fit: contain; }

    /* Modern Button */
    .btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        margin-top: 20px;
        display: inline-flex;
        align-items: center; gap: 8px;
        box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
    }
    .btn:disabled { background: #475569; cursor: not-allowed; opacity: 0.7; }

    /* Loading Animation */
    .loader {
        position: absolute; inset: 0;
        background: rgba(15, 23, 42, 0.8);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 10;
    }
    .spinner {
        width: 40px; height: 40px;
        border: 4px solid rgba(255,255,255,0.1);
        border-left-color: var(--primary);
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 15px;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    .status-text { font-size: 0.9rem; color: #cbd5e1; }

</style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom: 5px;">AI Auto Remover</h2>
    <p style="color: #94a3b8; font-size: 0.9rem; margin-bottom: 30px;">Automatic Background Removal (No Manual Work)</p>

    <!-- Upload Section -->
    <div class="upload-box" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div style="font-size: 3rem; margin-bottom: 10px;">🤖</div>
        <h3>Upload Photo</h3>
        <p style="color: #94a3b8; font-size: 0.85rem;">Tap to select from gallery</p>
    </div>

    <!-- Result Section -->
    <div class="preview-area" id="previewArea">
        <div class="loader" id="loader">
            <div class="spinner"></div>
            <div class="status-text" id="statusText">Loading AI Model...</div>
            <div style="font-size: 0.75rem; color: #64748b; margin-top:5px">(First time takes a few seconds)</div>
        </div>
        <img id="resultImage" src="" alt="Result">
    </div>

    <button class="btn" id="downloadBtn" style="display: none;">
        Download HD PNG
    </button>
</div>

<input type="file" id="fileInput" hidden accept="image/*">

<script>
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const previewArea = document.getElementById('previewArea');
    const resultImage = document.getElementById('resultImage');
    const loader = document.getElementById('loader');
    const statusText = document.getElementById('statusText');
    const downloadBtn = document.getElementById('downloadBtn');

    // Load AI Config
    let config = {
        device: 'gpu' // Try to use Graphics Card if available
    };

    fileInput.addEventListener('change', (e) => processImage(e.target.files[0]));

    async function processImage(file) {
        if (!file) return;

        // UI Updates
        dropZone.style.display = 'none';
        previewArea.style.display = 'flex';
        loader.style.display = 'flex';
        downloadBtn.style.display = 'none';
        statusText.innerText = "Initializing AI Model...";

        try {
            // 1. Load Image locally first to show something
            const tempUrl = URL.createObjectURL(file);
            resultImage.src = tempUrl; // Show original momentarily

            // 2. Run AI Removal
            statusText.innerText = "Removing Background...";
            
            // This function uses WebAssembly AI to remove BG
            const imageBlob = await imgly.removeBackground(file, {
                progress: (key, current, total) => {
                    // Update progress text
                    const percent = Math.round((current / total) * 100);
                    statusText.innerText = `Processing AI: ${percent}%`;
                }
            });

            // 3. Show Result
            const url = URL.createObjectURL(imageBlob);
            resultImage.src = url;
            
            loader.style.display = 'none';
            downloadBtn.style.display = 'inline-flex';
            
            // Setup Download
            downloadBtn.onclick = () => {
                const link = document.createElement('a');
                link.href = url;
                link.download = 'ai-removed-bg.png';
                link.click();
            };

        } catch (error) {
            console.error(error);
            alert("Error processing image. Please try a clearer photo.");
            location.reload();
        }
    }
</script>

</body>
</html>
