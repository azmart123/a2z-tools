<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer - Tools Wonder</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-blue: #007bff;
            --primary-blue-dark: #0056b3;
            --light-blue-bg: #e7f3ff;
            --text-dark: #212529;
            --text-light: #6c757d;
            --bg-white: #ffffff;
            --border-color: #dee2e6;
            --border-radius: 8px;
            --font-primary: 'Roboto', sans-serif;
            --font-headings: 'Montserrat', sans-serif;
        }

        body {
            font-family: var(--font-primary);
            color: var(--text-dark);
            margin: 0;
            background-color: #f8f9fa;
        }

        .site-header { background-color: var(--bg-white); padding: 15px 0; border-bottom: 1px solid var(--border-color); text-align: center; }
        .site-header a { text-decoration: none; font-family: var(--font-headings); font-size: 1.9rem; font-weight: 700; color: var(--text-dark); }

        .container { max-width: 800px; margin: 40px auto; padding: 20px; background: var(--bg-white); border-radius: var(--border-radius); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        h2 { font-family: var(--font-headings); text-align: center; color: var(--text-dark); margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        h2 i { color: var(--primary-blue); }
        .desc { text-align: center; color: var(--text-light); margin-bottom: 30px; }

        /* Upload Zone */
        .upload-zone {
            border: 2px dashed var(--primary-blue); border-radius: var(--border-radius);
            padding: 40px 20px; text-align: center; background-color: var(--light-blue-bg);
            cursor: pointer; transition: 0.3s ease; position: relative;
        }
        .upload-zone:hover { background-color: #d1e7ff; }
        .upload-zone i { font-size: 3rem; color: var(--primary-blue); margin-bottom: 15px; }
        .upload-zone p { font-size: 1.1rem; font-weight: 500; margin: 0; }
        .upload-zone input[type="file"] { position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer; }

        /* Preview Area */
        .preview-area { display: none; text-align: center; margin-top: 30px; }
        .preview-area img { max-width: 100%; max-height: 300px; border-radius: var(--border-radius); border: 1px solid var(--border-color); margin-bottom: 20px; }

        .original-dims { font-size: 0.9rem; color: var(--text-light); margin-bottom: 20px; }

        /* Controls */
        .controls { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .dimension-inputs { display: flex; gap: 15px; }
        .control-group { display: flex; flex-direction: column; text-align: left; flex: 1; }
        .control-group label { font-weight: 500; margin-bottom: 5px; font-size: 0.9rem; }
        input[type="number"] { padding: 10px; border: 1px solid var(--border-color); border-radius: 5px; font-size: 1rem; width: 100%; box-sizing: border-box; }
        
        .checkbox-group { display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 5px; }
        .checkbox-group label { margin: 0; cursor: pointer; font-size: 0.9rem; color: var(--text-dark); }
        .checkbox-group input { cursor: pointer; width: 16px; height: 16px; }

        .tool-button {
            background-color: var(--primary-blue); color: var(--bg-white); border: none;
            padding: 12px 24px; border-radius: var(--border-radius); font-weight: 500;
            cursor: pointer; font-size: 1rem; transition: 0.3s; margin-top: 15px; text-transform: uppercase;
        }
        .tool-button:hover { background-color: var(--primary-blue-dark); transform: translateY(-2px); }

        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--primary-blue); text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <header class="site-header">
        <a href="../index.html">Tools Wonder</a>
    </header>

    <div class="container">
        <h2><i class="fas fa-expand-arrows-alt"></i> Image Resizer</h2>
        <p class="desc">Change the dimensions (width and height) of your images easily.</p>

        <div class="upload-zone" id="dropZone">
            <i class="fas fa-image"></i>
            <p>Drag & Drop your image here</p>
            <span style="color: var(--text-light); font-size: 0.9rem;">Supports JPG, PNG, WEBP</span>
            <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp">
        </div>

        <div class="preview-area" id="previewArea">
            <img id="imagePreview" src="" alt="Preview">
            <div class="original-dims" id="originalDims">Original Dimensions: 0 x 0 px</div>
            
            <div class="controls">
                <div class="dimension-inputs">
                    <div class="control-group">
                        <label>Width (px):</label>
                        <input type="number" id="widthInput" min="1">
                    </div>
                    <div class="control-group">
                        <label>Height (px):</label>
                        <input type="number" id="heightInput" min="1">
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="aspectRatio" checked>
                    <label for="aspectRatio">Maintain Aspect Ratio</label>
                </div>

                <button class="tool-button" id="resizeBtn"><i class="fas fa-download"></i> Resize & Download</button>
            </div>
        </div>

        <a href="../index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Tools</a>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const previewArea = document.getElementById('previewArea');
        const imagePreview = document.getElementById('imagePreview');
        const dropZone = document.getElementById('dropZone');
        const originalDims = document.getElementById('originalDims');
        
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const aspectRatioCb = document.getElementById('aspectRatio');
        const resizeBtn = document.getElementById('resizeBtn');

        let currentImage = null;
        let originalFileName = "";
        let fileExtension = "";
        let originalWidth = 0;
        let originalHeight = 0;

        // Handle file selection
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const parts = file.name.split('.');
                originalFileName = parts.slice(0, -1).join('.');
                fileExtension = parts[parts.length - 1].toLowerCase();
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImage = new Image();
                    currentImage.onload = function() {
                        originalWidth = currentImage.width;
                        originalHeight = currentImage.height;
                        
                        imagePreview.src = currentImage.src;
                        originalDims.innerText = `Original Dimensions: ${originalWidth} x ${originalHeight} px`;
                        
                        // Set inputs to original sizes initially
                        widthInput.value = originalWidth;
                        heightInput.value = originalHeight;

                        dropZone.style.display = 'none';
                        previewArea.style.display = 'block';
                    }
                    currentImage.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // Handle Aspect Ratio logic
        widthInput.addEventListener('input', function() {
            if (aspectRatioCb.checked && originalWidth > 0) {
                const ratio = originalHeight / originalWidth;
                heightInput.value = Math.round(this.value * ratio);
            }
        });

        heightInput.addEventListener('input', function() {
            if (aspectRatioCb.checked && originalHeight > 0) {
                const ratio = originalWidth / originalHeight;
                widthInput.value = Math.round(this.value * ratio);
            }
        });

        // Resize and Download
        resizeBtn.addEventListener('click', function() {
            if (!currentImage) return;

            const newWidth = parseInt(widthInput.value);
            const newHeight = parseInt(heightInput.value);

            if (isNaN(newWidth) || isNaN(newHeight) || newWidth <= 0 || newHeight <= 0) {
                alert("Please enter valid width and height.");
                return;
            }

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = newWidth;
            canvas.height = newHeight;

            // Draw resized image
            ctx.drawImage(currentImage, 0, 0, newWidth, newHeight);

            // Determine output format based on original file
            let outputFormat = 'image/jpeg';
            if (fileExtension === 'png') outputFormat = 'image/png';
            if (fileExtension === 'webp') outputFormat = 'image/webp';

            const resizedDataUrl = canvas.toDataURL(outputFormat, 0.9);

            // Trigger Download
            const link = document.createElement('a');
            link.download = `${originalFileName}_resized.${fileExtension}`;
            link.href = resizedDataUrl;
            link.click();
        });
    </script>
</body>
</html>
