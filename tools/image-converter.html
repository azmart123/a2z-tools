<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Converter - Tools Wonder</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-blue: #007bff;
            --primary-blue-dark: #0056b3;
            --light-blue-bg: #e7f3ff;
            --text-dark: #212529;
            --text-light: #6c757d;
            --bg-white: #ffffff;
            --border-color: #dee2e6;
            --border-radius: 8px;
            --font-primary: 'Roboto', sans-serif;
            --font-headings: 'Montserrat', sans-serif;
        }

        body {
            font-family: var(--font-primary);
            color: var(--text-dark);
            margin: 0;
            background-color: #f8f9fa;
        }

        .site-header { background-color: var(--bg-white); padding: 15px 0; border-bottom: 1px solid var(--border-color); text-align: center; }
        .site-header a { text-decoration: none; font-family: var(--font-headings); font-size: 1.9rem; font-weight: 700; color: var(--text-dark); }

        .container { max-width: 800px; margin: 40px auto; padding: 20px; background: var(--bg-white); border-radius: var(--border-radius); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        h2 { font-family: var(--font-headings); text-align: center; color: var(--text-dark); margin-bottom: 10px; }
        .desc { text-align: center; color: var(--text-light); margin-bottom: 30px; }

        /* Modern Drag & Drop Zone */
        .upload-zone {
            border: 2px dashed var(--primary-blue);
            border-radius: var(--border-radius);
            padding: 40px 20px;
            text-align: center;
            background-color: var(--light-blue-bg);
            cursor: pointer;
            transition: 0.3s ease;
            position: relative;
        }
        .upload-zone:hover { background-color: #d1e7ff; }
        .upload-zone i { font-size: 3rem; color: var(--primary-blue); margin-bottom: 15px; }
        .upload-zone p { font-size: 1.1rem; font-weight: 500; margin: 0; }
        .upload-zone input[type="file"] {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; opacity: 0; cursor: pointer;
        }

        /* Preview Area */
        .preview-area { display: none; text-align: center; margin-top: 30px; }
        .preview-area img { max-width: 100%; max-height: 300px; border-radius: var(--border-radius); border: 1px solid var(--border-color); margin-bottom: 20px; }

        /* Controls */
        .controls { display: flex; flex-direction: column; gap: 15px; max-width: 400px; margin: 0 auto; }
        .control-group { display: flex; flex-direction: column; text-align: left; }
        .control-group label { font-weight: 500; margin-bottom: 5px; }
        select, input[type="range"] { padding: 10px; border: 1px solid var(--border-color); border-radius: 5px; font-size: 1rem; }
        
        .tool-button {
            background-color: var(--primary-blue); color: var(--bg-white); border: none;
            padding: 12px 24px; border-radius: var(--border-radius); font-weight: 500;
            cursor: pointer; font-size: 1rem; transition: 0.3s; margin-top: 10px; text-transform: uppercase;
        }
        .tool-button:hover { background-color: var(--primary-blue-dark); transform: translateY(-2px); }

        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--primary-blue); text-decoration: none; }
        .back-link:hover { text-decoration: underline; }

    </style>
</head>
<body>

    <header class="site-header">
        <a href="index.html">Tools Wonder</a>
    </header>

    <div class="container">
        <h2><i class="fas fa-exchange-alt"></i> Image Converter</h2>
        <p class="desc">Convert your images to JPG, PNG, or WEBP instantly. Everything happens securely in your browser!</p>

        <div class="upload-zone" id="dropZone">
            <i class="fas fa-cloud-upload-alt"></i>
            <p>Drag & Drop your image here</p>
            <span style="color: var(--text-light); font-size: 0.9rem;">or click to browse files</span>
            <input type="file" id="imageInput" accept="image/png, image/jpeg, image/webp, image/gif">
        </div>

        <div class="preview-area" id="previewArea">
            <img id="imagePreview" src="" alt="Preview">
            
            <div class="controls">
                <div class="control-group">
                    <label>Convert To:</label>
                    <select id="formatSelect">
                        <option value="image/jpeg">JPG / JPEG</option>
                        <option value="image/png">PNG</option>
                        <option value="image/webp">WEBP</option>
                    </select>
                </div>
                
                <div class="control-group" id="qualityGroup">
                    <label>Quality: <span id="qualityValue">90%</span></label>
                    <input type="range" id="qualityInput" min="0.1" max="1" step="0.1" value="0.9">
                </div>

                <button class="tool-button" id="convertBtn"><i class="fas fa-download"></i> Convert & Download</button>
            </div>
        </div>

        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Tools</a>
    </div>

    <script>
        const imageInput = document.getElementById('imageInput');
        const previewArea = document.getElementById('previewArea');
        const imagePreview = document.getElementById('imagePreview');
        const formatSelect = document.getElementById('formatSelect');
        const qualityInput = document.getElementById('qualityInput');
        const qualityValue = document.getElementById('qualityValue');
        const qualityGroup = document.getElementById('qualityGroup');
        const convertBtn = document.getElementById('convertBtn');
        const dropZone = document.getElementById('dropZone');

        let currentImage = null;
        let originalFileName = "";

        // Handle file selection
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                originalFileName = file.name.split('.')[0]; // Get name without extension
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentImage = new Image();
                    currentImage.onload = function() {
                        imagePreview.src = currentImage.src;
                        dropZone.style.display = 'none';
                        previewArea.style.display = 'block';
                    }
                    currentImage.src = event.target.result;
                }
                reader.readAsDataURL(file);
            }
        });

        // Hide quality slider if PNG is selected (PNG is lossless)
        formatSelect.addEventListener('change', function() {
            if (this.value === 'image/png') {
                qualityGroup.style.display = 'none';
            } else {
                qualityGroup.style.display = 'flex';
            }
        });

        // Update quality text
        qualityInput.addEventListener('input', function() {
            qualityValue.innerText = Math.round(this.value * 100) + '%';
        });

        // Convert and Download Logic using HTML5 Canvas
        convertBtn.addEventListener('click', function() {
            if (!currentImage) return;

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = currentImage.width;
            canvas.height = currentImage.height;

            // Draw image on canvas
            ctx.drawImage(currentImage, 0, 0);

            // Get format and quality
            const format = formatSelect.value;
            const quality = parseFloat(qualityInput.value);
            const extension = format.split('/')[1];

            // Convert to data URL
            const convertedDataUrl = canvas.toDataURL(format, format === 'image/png' ? undefined : quality);

            // Trigger Download
            const link = document.createElement('a');
            link.download = `${originalFileName}_converted.${extension === 'jpeg' ? 'jpg' : extension}`;
            link.href = convertedDataUrl;
            link.click();
        });
    </script>
</body>
</html>
