<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Background Remover</title>
<style>
    :root {
        --bg: #111827;
        --panel: #1f2937;
        --primary: #6366f1;
        --text: #f3f4f6;
        --border: #374151;
    }

    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    /* Top Bar */
    header {
        height: 60px;
        background: var(--panel);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 20px;
        justify-content: space-between;
    }

    .logo { font-weight: bold; font-size: 1.2rem; color: #fff; }
    
    /* Main Area */
    .container {
        display: flex;
        flex: 1;
        height: calc(100vh - 60px);
    }

    /* Sidebar */
    .sidebar {
        width: 300px;
        background: var(--panel);
        border-right: 1px solid var(--border);
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        z-index: 10;
    }

    /* Canvas Area */
    .workspace {
        flex: 1;
        background-color: #000;
        background-image: 
            linear-gradient(45deg, #222 25%, transparent 25%), 
            linear-gradient(-45deg, #222 25%, transparent 25%), 
            linear-gradient(45deg, transparent 75%, #222 75%), 
            linear-gradient(-45deg, transparent 75%, #222 75%);
        background-size: 20px 20px;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    canvas {
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
        cursor: crosshair;
        max-width: 100%;
        max-height: 100%;
    }

    /* Controls */
    .control-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #9ca3af; }
    
    input[type="range"] {
        width: 100%;
        accent-color: var(--primary);
    }

    .btn {
        background: var(--primary);
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        width: 100%;
    }
    .btn:hover { opacity: 0.9; }
    .btn-outline { background: transparent; border: 1px solid var(--border); margin-top: 10px; }

    .color-box {
        height: 40px;
        border-radius: 6px;
        border: 2px solid white;
        cursor: pointer;
        background: white;
    }

    /* Loading */
    .loader {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0,0,0,0.8);
        padding: 20px;
        border-radius: 10px;
        display: none;
        z-index: 100;
    }
    .loader.active { display: block; }
    
    /* Upload Screen */
    .upload-screen {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg);
        z-index: 50;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
    }
    .upload-box {
        border: 2px dashed var(--border);
        padding: 50px;
        border-radius: 20px;
        text-align: center;
        cursor: pointer;
    }
    .upload-box:hover { border-color: var(--primary); background: rgba(99, 102, 241, 0.1); }

</style>
</head>
<body>

<header>
    <div class="logo">AutoRemove</div>
    <button class="btn" style="width: auto;" id="downloadBtn" disabled>Download Image</button>
</header>

<div class="container">
    <div class="sidebar">
        <div class="control-group">
            <label>Selected Color (Click image to change)</label>
            <div class="color-box" id="colorPreview"></div>
        </div>

        <div class="control-group">
            <label>Tolerance (Power): <span id="tolVal">15</span>%</label>
            <input type="range" id="tolerance" min="1" max="100" value="15">
        </div>

        <div class="control-group">
            <label>Edge Smoothing</label>
            <input type="range" id="smoothing" min="0" max="10" value="2">
        </div>

        <div style="margin-top:auto">
            <button class="btn btn-outline" onclick="location.reload()">Start Over</button>
        </div>
    </div>

    <div class="workspace">
        <div class="upload-screen" id="uploadScreen">
            <div class="upload-box" onclick="document.getElementById('fileIn').click()">
                <h2>📁 Upload Image</h2>
                <p style="color: #9ca3af">Click here to select a photo</p>
            </div>
        </div>
        
        <canvas id="canvas"></canvas>
        <div class="loader" id="loader">Processing...</div>
    </div>
</div>

<input type="file" id="fileIn" hidden accept="image/*">

<script>
    const fileIn = document.getElementById('fileIn');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const toleranceInput = document.getElementById('tolerance');
    const smoothingInput = document.getElementById('smoothing');
    const colorPreview = document.getElementById('colorPreview');
    const loader = document.getElementById('loader');
    
    let originalData = null; // Stores the original pixels
    let targetColor = { r: 255, g: 255, b: 255 }; // Color to remove

    // 1. Upload Logic
    fileIn.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(!file) return;
        
        const img = new Image();
        img.onload = () => {
            // Set canvas size
            let w = img.width;
            let h = img.height;
            
            // Limit size for speed (Optional, helps if image is 4K+)
            if(w > 2000) { h = Math.round(h * (2000/w)); w = 2000; }
            
            canvas.width = w;
            canvas.height = h;
            ctx.drawImage(img, 0, 0, w, h);
            
            // Save original pixels
            originalData = ctx.getImageData(0, 0, w, h);
            
            // Hide upload screen
            document.getElementById('uploadScreen').style.display = 'none';
            document.getElementById('downloadBtn').disabled = false;
            
            // Auto detect background
            autoDetectBackground();
        };
        img.src = URL.createObjectURL(file);
    });

    // 2. Main Removal Function (No AI, Pure Math)
    function removeBackground() {
        if (!originalData) return;
        
        loader.classList.add('active'); // Show loading

        // Give UI time to show loader
        setTimeout(() => {
            const w = canvas.width;
            const h = canvas.height;
            const tolerance = parseInt(toleranceInput.value);
            const smoothing = parseInt(smoothingInput.value);
            
            // Get fresh copy of original pixels
            const newData = new ImageData(
                new Uint8ClampedArray(originalData.data),
                w, h
            );
            const data = newData.data;

            // Math setup
            const tr = targetColor.r;
            const tg = targetColor.g;
            const tb = targetColor.b;
            const threshold = (tolerance / 100) * 442; // Max color distance
            const thresholdSq = threshold * threshold;
            const smoothSq = (threshold + smoothing * 10) ** 2;

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];

                // Calculate color difference
                const distSq = (r-tr)**2 + (g-tg)**2 + (b-tb)**2;

                if (distSq < thresholdSq) {
                    data[i+3] = 0; // Transparent
                } else if (distSq < smoothSq) {
                    // Smooth edge
                    const factor = (distSq - thresholdSq) / (smoothSq - thresholdSq);
                    data[i+3] = factor * 255;
                }
            }

            ctx.putImageData(newData, 0, 0);
            loader.classList.remove('active');
        }, 50);
    }

    // 3. Auto Detect Background (Corners)
    function autoDetectBackground() {
        const data = originalData.data;
        const w = canvas.width;
        // Check top-left pixel
        targetColor = { r: data[0], g: data[1], b: data[2] };
        updateColorUI();
        removeBackground();
    }

    // 4. Click to pick color
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        // Calculate correct position considering resize/fit
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.floor((e.clientX - rect.left) * scaleX);
        const y = Math.floor((e.clientY - rect.top) * scaleY);
        
        const i = (y * canvas.width + x) * 4;
        
        // Pick from ORIGINAL data
        if(originalData) {
            targetColor = {
                r: originalData.data[i],
                g: originalData.data[i+1],
                b: originalData.data[i+2]
            };
            updateColorUI();
            removeBackground();
        }
    });

    function updateColorUI() {
        colorPreview.style.background = `rgb(${targetColor.r},${targetColor.g},${targetColor.b})`;
    }

    // Event Listeners
    toleranceInput.addEventListener('input', (e) => {
        document.getElementById('tolVal').innerText = e.target.value;
    });
    toleranceInput.addEventListener('change', removeBackground); // Process on release
    smoothingInput.addEventListener('change', removeBackground);

    document.getElementById('downloadBtn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'removed_bg.png';
        link.href = canvas.toDataURL();
        link.click();
    });

</script>

</body>
</html>
