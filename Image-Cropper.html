
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PixelPerfect | Modern Image Cropper</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Cropper.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* Custom scrollbar for tools panel */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Cropper container overrides for dark theme feel in canvas */
        .cropper-modal {
            opacity: 0.6;
            background-color: #0f172a;
        }
        .cropper-view-box {
            box-shadow: 0 0 0 1px #38bdf8;
            outline: 0;
        }
        .cropper-line {
            background-color: #38bdf8;
        }
        .cropper-point {
            background-color: #38bdf8;
            width: 8px;
            height: 8px;
        }

        /* Checkerboard pattern for transparency */
        .checkerboard {
            background-color: #f8fafc;
            background-image:
                linear-gradient(45deg, #e2e8f0 25%, transparent 25%),
                linear-gradient(-45deg, #e2e8f0 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #e2e8f0 75%),
                linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex flex-col overflow-hidden">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 h-16 flex-none z-20 shadow-sm">
        <div class="h-full px-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-brand-600 rounded-lg flex items-center justify-center text-white text-lg">
                    <i class="fa-solid fa-crop-simple"></i>
                </div>
                <h1 class="font-bold text-xl tracking-tight text-slate-800">Pixel<span class="text-brand-600">Perfect</span></h1>
            </div>
            
            <div class="flex items-center gap-3">
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <button onclick="document.getElementById('imageInput').click()" 
                        class="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-folder-open"></i>
                    <span class="hidden sm:inline">Open Image</span>
                </button>
                <button id="downloadBtn" onclick="cropAndDownload()" disabled
                        class="px-4 py-2 text-sm font-medium text-white bg-brand-600 hover:bg-brand-700 disabled:opacity-50 disabled:cursor-not-allowed rounded-lg shadow-sm transition-all flex items-center gap-2">
                    <i class="fa-solid fa-download"></i>
                    <span class="hidden sm:inline">Crop & Save</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- Tools Sidebar -->
        <aside class="w-16 sm:w-20 lg:w-72 bg-white border-r border-slate-200 flex flex-col z-10 flex-none transition-all duration-300">
            <!-- Tabs (Desktop only headers) -->
            <div class="hidden lg:flex px-5 py-4 border-b border-slate-100">
                <h2 class="font-semibold text-sm text-slate-500 uppercase tracking-wider">Adjustment Tools</h2>
            </div>

            <!-- Tool Content -->
            <div class="flex-1 overflow-y-auto custom-scrollbar p-2 lg:p-5 space-y-6">
                
                <!-- Aspect Ratio Section -->
                <div class="group">
                    <label class="hidden lg:block text-xs font-semibold text-slate-400 mb-3 uppercase">Aspect Ratio</label>
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-2">
                        <button onclick="setRatio(NaN, this)" class="ratio-btn active p-2 lg:px-3 lg:py-2 rounded-lg border border-brand-200 bg-brand-50 text-brand-700 hover:bg-brand-100 transition text-center" title="Free">
                            <i class="fa-solid fa-expand lg:hidden"></i>
                            <span class="hidden lg:block text-sm">Free</span>
                        </button>
                        <button onclick="setRatio(1, this)" class="ratio-btn p-2 lg:px-3 lg:py-2 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition text-center" title="1:1 (Square)">
                            <i class="fa-regular fa-square lg:hidden"></i>
                            <span class="hidden lg:block text-sm">1:1</span>
                        </button>
                        <button onclick="setRatio(16/9, this)" class="ratio-btn p-2 lg:px-3 lg:py-2 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition text-center" title="16:9">
                            <i class="fa-solid fa-tv lg:hidden"></i>
                            <span class="hidden lg:block text-sm">16:9</span>
                        </button>
                        <button onclick="setRatio(4/3, this)" class="ratio-btn p-2 lg:px-3 lg:py-2 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition text-center" title="4:3">
                            <i class="fa-regular fa-image lg:hidden"></i>
                            <span class="hidden lg:block text-sm">4:3</span>
                        </button>
                        <button onclick="setRatio(2/3, this)" class="ratio-btn p-2 lg:px-3 lg:py-2 rounded-lg border border-slate-200 text-slate-600 hover:bg-slate-50 hover:border-slate-300 transition text-center" title="2:3">
                            <i class="fa-solid fa-mobile-screen lg:hidden"></i>
                            <span class="hidden lg:block text-sm">2:3</span>
                        </button>
                    </div>
                </div>

                <div class="h-px bg-slate-100 w-full"></div>

                <!-- Rotation & Flip -->
                <div>
                    <label class="hidden lg:block text-xs font-semibold text-slate-400 mb-3 uppercase">Orientation</label>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-2">
                        <button onclick="rotate(-90)" class="p-2 lg:py-2 rounded-lg bg-slate-50 hover:bg-slate-100 text-slate-700 border border-slate-200 transition" title="Rotate Left">
                            <i class="fa-solid fa-rotate-left"></i>
                        </button>
                        <button onclick="rotate(90)" class="p-2 lg:py-2 rounded-lg bg-slate-50 hover:bg-slate-100 text-slate-700 border border-slate-200 transition" title="Rotate Right">
                            <i class="fa-solid fa-rotate-right"></i>
                        </button>
                        <button onclick="flip('h')" class="p-2 lg:py-2 rounded-lg bg-slate-50 hover:bg-slate-100 text-slate-700 border border-slate-200 transition" title="Flip Horizontal">
                            <i class="fa-solid fa-arrows-left-right"></i>
                        </button>
                        <button onclick="flip('v')" class="p-2 lg:py-2 rounded-lg bg-slate-50 hover:bg-slate-100 text-slate-700 border border-slate-200 transition" title="Flip Vertical">
                            <i class="fa-solid fa-arrows-up-down"></i>
                        </button>
                    </div>
                </div>

                <div class="h-px bg-slate-100 w-full"></div>

                <!-- Zoom -->
                <div>
                    <label class="hidden lg:block text-xs font-semibold text-slate-400 mb-3 uppercase">Zoom</label>
                    <div class="flex flex-col lg:flex-row gap-2">
                        <button onclick="zoom(0.1)" class="flex-1 p-2 rounded-lg bg-slate-50 hover:bg-slate-100 text-slate-700 border border-slate-200 transition">
                            <i class="fa-solid fa-magnifying-glass-plus"></i>
                        </button>
                        <button onclick="zoom(-0.1)" class="flex-1 p-2 rounded-lg bg-slate-50 hover:bg-slate-100 text-slate-700 border border-slate-200 transition">
                            <i class="fa-solid fa-magnifying-glass-minus"></i>
                        </button>
                    </div>
                </div>

                 <div class="h-px bg-slate-100 w-full"></div>

                 <!-- Reset -->
                 <div>
                    <button onclick="resetCropper()" class="w-full p-2 lg:py-2.5 rounded-lg text-red-600 bg-red-50 hover:bg-red-100 border border-red-200 transition flex items-center justify-center gap-2">
                        <i class="fa-solid fa-arrow-rotate-right"></i>
                        <span class="hidden lg:inline font-medium">Reset All</span>
                    </button>
                 </div>
            </div>
        </aside>

        <!-- Canvas Area -->
        <section class="flex-1 relative bg-slate-100 overflow-hidden flex flex-col">
            <!-- Canvas Wrapper -->
            <div id="canvas-container" class="flex-1 relative w-full h-full checkerboard flex items-center justify-center p-4 sm:p-8">
                
                <!-- Initial Empty State -->
                <div id="empty-state" class="text-center z-10 p-10 border-2 border-dashed border-slate-300 rounded-xl bg-white/50 backdrop-blur-sm hover:bg-white/80 hover:border-brand-400 transition-all cursor-pointer" onclick="document.getElementById('imageInput').click()">
                    <div class="w-16 h-16 bg-brand-100 text-brand-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                    </div>
                    <h3 class="text-lg font-semibold text-slate-700 mb-1">Drop image here</h3>
                    <p class="text-slate-500 text-sm mb-4">or click to browse</p>
                    <button class="px-4 py-2 bg-white border border-slate-300 rounded-lg text-sm text-slate-700 font-medium hover:border-brand-500 hover:text-brand-600 transition shadow-sm">
                        Select File
                    </button>
                </div>

                <!-- Image to be cropped -->
                <img id="image" src="" alt="Picture" class="max-w-full hidden opacity-0">
            </div>
        </section>

    </main>

    <!-- Modal for Download/Preview -->
    <div id="resultModal" class="fixed inset-0 z-50 bg-slate-900/80 backdrop-blur-sm hidden items-center justify-center p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full flex flex-col max-h-[90vh] overflow-hidden transform transition-all scale-100">
            
            <div class="flex items-center justify-between p-5 border-b border-slate-100">
                <h3 class="text-lg font-bold text-slate-800">Cropped Image</h3>
                <button onclick="closeModal()" class="w-8 h-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 flex items-center justify-center transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="p-6 bg-slate-50 overflow-auto flex-1 flex items-center justify-center checkerboard">
                <img id="resultImage" class="max-w-full h-auto rounded-lg shadow-lg border border-slate-200" src="" alt="Result">
            </div>

            <div class="p-5 border-t border-slate-100 flex items-center justify-end gap-3 bg-white">
                <button onclick="closeModal()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg font-medium transition">
                    Keep Editing
                </button>
                <a id="downloadLink" href="#" download="cropped-image.png" class="px-5 py-2 bg-brand-600 text-white rounded-lg font-medium hover:bg-brand-700 shadow-md hover:shadow-lg transition flex items-center gap-2">
                    <i class="fa-solid fa-download"></i>
                    Download
                </a>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script>
        // DOM Elements
        const image = document.getElementById('image');
        const input = document.getElementById('imageInput');
        const emptyState = document.getElementById('empty-state');
        const downloadBtn = document.getElementById('downloadBtn');
        const canvasContainer = document.getElementById('canvas-container');
        
        // Modal Elements
        const modal = document.getElementById('resultModal');
        const resultImage = document.getElementById('resultImage');
        const downloadLink = document.getElementById('downloadLink');

        let cropper;
        let scaleX = 1;
        let scaleY = 1;

        // Initialize drag and drop
        canvasContainer.addEventListener('dragover', (e) => {
            e.preventDefault();
            canvasContainer.classList.add('bg-brand-50/50');
        });

        canvasContainer.addEventListener('dragleave', (e) => {
            e.preventDefault();
            canvasContainer.classList.remove('bg-brand-50/50');
        });

        canvasContainer.addEventListener('drop', (e) => {
            e.preventDefault();
            canvasContainer.classList.remove('bg-brand-50/50');
            const files = e.dataTransfer.files;
            if (files && files.length > 0) {
                handleFile(files[0]);
            }
        });

        // Handle File Input
        input.addEventListener('change', (e) => {
            const files = e.target.files;
            if (files && files.length > 0) {
                handleFile(files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file.');
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                // Reset state
                if (cropper) {
                    cropper.destroy();
                }

                // UI Update
                emptyState.classList.add('hidden');
                image.classList.remove('hidden');
                image.src = e.target.result;
                downloadBtn.disabled = false;

                // Initialize Cropper after image loads
                image.onload = () => {
                   initCropper();
                };
            };
            reader.readAsDataURL(file);
        }

        function initCropper() {
            cropper = new Cropper(image, {
                viewMode: 1, // Restrict crop box to image size
                dragMode: 'move',
                aspectRatio: NaN, // Free mode default
                autoCropArea: 0.9,
                restore: false,
                guides: true,
                center: true,
                highlight: false,
                cropBoxMovable: true,
                cropBoxResizable: true,
                toggleDragModeOnDblclick: false,
                responsive: true,
                background: false, // We use our own CSS background
            });
        }

        // --- Toolbar Functions ---

        function setRatio(ratio, btn) {
            if (!cropper) return;
            cropper.setAspectRatio(ratio);
            
            // Update active state in UI
            document.querySelectorAll('.ratio-btn').forEach(b => {
                b.classList.remove('active', 'bg-brand-50', 'text-brand-700', 'border-brand-200');
                b.classList.add('text-slate-600', 'border-slate-200');
            });
            
            btn.classList.add('active', 'bg-brand-50', 'text-brand-700', 'border-brand-200');
            btn.classList.remove('text-slate-600', 'border-slate-200');
        }

        function zoom(amount) {
            if (!cropper) return;
            cropper.zoom(amount);
        }

        function rotate(degree) {
            if (!cropper) return;
            cropper.rotate(degree);
        }

        function flip(direction) {
            if (!cropper) return;
            
            if (direction === 'h') {
                scaleX = -scaleX;
                cropper.scaleX(scaleX);
            } else {
                scaleY = -scaleY;
                cropper.scaleY(scaleY);
            }
        }

        function resetCropper() {
            if (!cropper) return;
            cropper.reset();
            scaleX = 1;
            scaleY = 1;
            // Reset ratio buttons visually to Free mode
            const freeBtn = document.querySelector('.ratio-btn'); 
            setRatio(NaN, freeBtn);
        }

        // --- Export Functions ---

        function cropAndDownload() {
            if (!cropper) return;

            // Get the cropped canvas
            // We use high quality settings
            const canvas = cropper.getCroppedCanvas({
                maxWidth: 4096,
                maxHeight: 4096,
                imageSmoothingEnabled: true,
                imageSmoothingQuality: 'high',
            });

            if (!canvas) {
                alert('Could not crop image. Please try again.');
                return;
            }

            // Show Modal
            const dataUrl = canvas.toDataURL('image/png');
            resultImage.src = dataUrl;
            downloadLink.href = dataUrl;
            
            // Set filename based on original or default
            const originalName = input.files[0]?.name || 'image';
            const namePart = originalName.split('.').slice(0, -1).join('.') || 'image';
            downloadLink.download = `${namePart}-cropped.png`;

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModal() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // Close modal on outside click
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });
        
        // Handle keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (!cropper) return;
            
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                cropper.move(-10, 0);
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                cropper.move(10, 0);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                cropper.move(0, -10);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                cropper.move(0, 10);
            }
        });

    </script>
</body>
    </html>
